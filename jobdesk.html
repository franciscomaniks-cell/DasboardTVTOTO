<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TVTOTO | Atur Jobdesk</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div id="dashboardPage" class="flex">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="brand-text">DASH<span>BOARD</span></div>
            </div>
            <div class="menu-label">Main System</div>
            <div class="nav-item" onclick="location.href='jobdesk.html'"><span>📊</span> Overview</div>
            
            <div class="menu-label">Operational Tool</div>
            <div class="nav-item active"><span>📡</span> Atur Jobdesk <span class="nav-badge">NEW</span></div>
            <div class="nav-item"><span>📱</span> Absensi LINE <span class="nav-badge">AUTO</span></div>
            
            <div style="margin-top: auto; padding-bottom: 20px; border-top: 1px solid var(--border);">
                <div class="nav-item" onclick="handleLogout()" style="color: var(--danger); margin-top: 20px;">
                    <span>🚪</span> Sign Out System
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h2 class="orbitron-title">SISTEM PENGACAK JOBDESK</h2>
                
                <div class="form-group" style="max-width: 300px; margin-bottom: 25px;">
                    <label>🕒 Pilih Shift Kerja</label>
                    <select id="shiftSelect" class="custom-select">
                        <option value="SHIFT PAGI">SHIFT PAGI</option>
                        <option value="SHIFT SORE">SHIFT SORE</option>
                        <option value="SHIFT MALAM">SHIFT MALAM</option>
                    </select>
                </div>

                <div class="grid-2">
                    <div>
                        <label>👥 Daftar Staff (Baris 1 = Operator)</label>
                        <textarea id="staffInput" rows="8">RADO DINATA
IRVAN GANESHA
JOSIA ROMANDA GINTING
MUHAMMAD BAKRON
JANNIFER MENTARI</textarea>
                    </div>
                    <div>
                        <label>💼 Daftar Jobdesk</label>
                        <textarea id="jobInput" rows="8">DEPO BRI, BNI
DEPO MANUAL, OGL
WD BCA, BRI
WD MANDIRI, BNI
SCATER</textarea>
                    </div>
                </div>
                
                <div class="btn-group-row">
                    <button class="btn-acak" onclick="generateJobdesk()">🎲 ACAK & SIMPAN</button>
                    <button class="btn-png" onclick="downloadImage()">📸 UNDUH PNG</button>
                    <button class="btn-reset" onclick="clearHistory()">🗑️ RESET</button>
                </div>
            </div>

            <div id="captureArea" class="capture-box">
                <div class="capture-header">
                    <h2>LAPORAN TUGAS OPERASIONAL</h2>
                    <div id="shiftDisplayText" class="shift-tag">SHIFT PAGI</div>
                    <div id="tableDateText" class="date-tag"></div>
                </div>
                <table class="result-table">
                    <thead>
                        <tr>
                            <th>NAMA PERSONEL</th>
                            <th>TUGAS</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody"></tbody>
                </table>
            </div>

            <div class="card" style="margin-top: 25px;">
                <label>🕒 Riwayat Penugasan Terakhir</label>
                <div id="historyList" class="history-grid"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
