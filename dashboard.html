<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TVTOTO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="flex">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="brand-text">DASH<span>BOARD</span></div>
            </div>
            
            <div class="menu-label">Main System</div>
            <div class="nav-item" onclick="switchTab('overview')"><span>📊</span> Overview</div>
            
            <div class="menu-label">Operational Tool</div>
            <div id="nav-jobdesk" class="nav-item active" onclick="switchTab('jobdesk')">
                <span>📡</span> Atur Jobdesk <span class="nav-badge">NEW</span>
            </div>
            <div class="nav-item" onclick="switchTab('line')"><span>📱</span> Absensi LINE <span class="nav-badge">AUTO</span></div>
            <div class="nav-item nav-absensi-red" onclick="switchTab('absensi')"><span>👥</span> ABSENSI KEHADIRAN</div>

            <div class="sidebar-footer">
                <div class="nav-item logout-btn" onclick="handleLogout()"><span>🚪</span> Logout</div>
            </div>
        </div>

        <div class="main-content">
            <div id="tabJobdesk" class="tab-content">
                <div class="card">
                    <h2 class="orbitron-title">SISTEM PENGACAK JOBDESK</h2>
                    <div class="grid-2">
                        <div>
                            <label>🕒 Pilih Shift Kerja</label>
                            <select id="shiftSelect" class="custom-select">
                                <option value="SHIFT PAGI">SHIFT PAGI</option>
                                <option value="SHIFT SORE">SHIFT SORE</option>
                                <option value="SHIFT MALAM">SHIFT MALAM</option>
                            </select>
                            <label style="margin-top:15px">👥 Daftar Staff (Baris 1 = Operator)</label>
                            <textarea id="staffInput" rows="8" placeholder="Masukkan nama staff..."></textarea>
                        </div>
                        <div>
                            <label>💼 Daftar Jobdesk</label>
                            <textarea id="jobInput" rows="11" placeholder="Masukkan daftar tugas..."></textarea>
                        </div>
                    </div>
                    <div class="btn-group-row">
                        <button class="btn-acak" onclick="generateJobdesk()">🎲 ACAK & SIMPAN</button>
                        <button class="btn-png" onclick="downloadImage()">📸 UNDUH PNG</button>
                    </div>
                </div>

                <div id="captureArea" class="capture-box">
                    <div class="capture-header">
                        <h2>LAPORAN TUGAS OPERASIONAL</h2>
                        <div id="shiftDisplayText" class="shift-tag">-</div>
                        <div id="tableDateText" class="date-tag"></div>
                    </div>
                    <table class="result-table">
                        <thead>
                            <tr><th>NAMA PERSONEL</th><th>TUGAS</th></tr>
                        </thead>
                        <tbody id="resultBody"></tbody>
                    </table>
                </div>
            </div>

            <div id="tabOverview" class="tab-content hidden"><div class="card"><h2>Overview System Active</h2></div></div>
            <div id="tabLine" class="tab-content hidden"><div class="card"><h2>Absensi LINE Integrated</h2></div></div>
            <div id="tabAbsensi" class="tab-content hidden"><div class="card"><h2>Absensi Kehadiran Panel</h2></div></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
