<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TVTOTO System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginPage">
        <div class="login-card">
            <h1 class="brand-text">TV<span>TOTO</span></h1>
            <p>Enter your credentials to access dashboard</p>
            <div class="input-group">
                <input type="text" id="userLogin" placeholder="Username" required>
                <input type="password" id="passLogin" placeholder="Password" required>
            </div>
            <button class="btn-login" onclick="handleLogin()">AUTHENTICATE</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
