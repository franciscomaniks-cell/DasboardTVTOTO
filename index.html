<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TVTOTO | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loginPage">
        <div class="auth-container">
            <div id="loginForm">
                <div class="auth-header">
                    <h1>LOGIN<span> ACCESS</span></h1>
                    <p>Masukkan kredensial untuk masuk ke sistem.</p>
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="userLogin" placeholder="Username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="passLogin" placeholder="••••••••">
                </div>
                <button class="auth-btn" onclick="handleLogin()">AUTHENTICATE</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
